version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  # ER diagram generator (CLI only)
  schemaspy:
    image: schemaspy/schemaspy:latest
    container_name: schemaspy
    command: >
      -t pgsql
      -host postgres
      -port 5432
      -db postgres
      -u postgres
      -p postgres
    volumes:
      - ./er-output:/output
    depends_on:
      - postgres
    profiles:
      - er

volumes:
  postgres_data:

# docker-compose -f postgres-db.yaml -p postgres-db up -d
# docker compose -f postgres-db.yaml -p postgres-db --profile er run --rm schemaspy
